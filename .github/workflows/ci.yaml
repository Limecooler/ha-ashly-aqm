name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check custom_components/ tests/
      - run: ruff format --check custom_components/ tests/
      # strings.json is the HA-core source-of-truth; translations/en.json
      # is the compiled English file. They must stay byte-identical until
      # we wire up a real generator.
      - name: strings.json ↔ translations/en.json sync
        run: |
          python -c "import json; \
            a = json.load(open('custom_components/ashly/strings.json')); \
            b = json.load(open('custom_components/ashly/translations/en.json')); \
            assert a == b, 'strings.json and translations/en.json have drifted — sync them.'"

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install mypy pytest-homeassistant-custom-component aioresponses 'python-socketio[asyncio_client]>=5.10'
      - run: mypy custom_components/ashly/

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install pytest-homeassistant-custom-component aioresponses 'python-socketio[asyncio_client]>=5.10'
      - run: |
          pytest tests/ -v --tb=short \
            --cov=custom_components.ashly \
            --cov-report=term-missing \
            --cov-fail-under=100
